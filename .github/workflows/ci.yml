name: CI

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
      - '.claude/chat/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/scripts/**'
      - '.claude/chat/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch: {}

# Cancel superseded runs on the same ref instead of letting stale runs finish —
# saves Actions minutes (pattern from merkle-email-hub).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Lint + types + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/scripts
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run --extra dev ruff check .

      - name: Type check (mypy)
        run: uv run --extra dev mypy . --ignore-missing-imports

      - name: Tests
        run: uv run --extra dev pytest tests/ -q
