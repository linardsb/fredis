name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Fredis/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH to VPS and run deploy.sh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/claude-code-second-brain
            bash .claude/scripts/deploy.sh
