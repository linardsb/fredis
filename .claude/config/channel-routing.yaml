version: 1

# Slack channel name → vault folder (relative to project root).
# If a channel is renamed, update the key here OR rely on `by_id:` below
# (which always wins). Channel names must match Slack exactly — lowercase,
# hyphens only.
channels:
  # Topic lanes
  ideation:             Fredis/Memory/ideation/
  market-research:      Fredis/Memory/research/markets/
  marketing:            Fredis/Memory/marketing/
  product:              Fredis/Memory/product/
  legal:                Fredis/Memory/legal/
  finances:             Fredis/Memory/finance/

  # Research (domain)
  research-ai:          Fredis/Memory/research/ai/
  research-agriculture: Fredis/Memory/research/agriculture/
  research-robotics:    Fredis/Memory/research/robotics/
  research-policy:      Fredis/Memory/research/policy/
  research-materials:   Fredis/Memory/research/materials/

  # Product builds (per-lane engineering work)
  email-hub:            Fredis/Memory/builds/email-hub/
  vtv:                  Fredis/Memory/builds/vtv/
  cab-app:              Fredis/Memory/builds/cab-app/

  # People / orgs
  clients:              Fredis/Memory/retainers/
  competition:          Fredis/Memory/competitors/
  partners:             Fredis/Memory/partners/

  # Integrations (per-platform chatter)
  gmail:                Fredis/Memory/integrations/gmail/
  calendar:             Fredis/Memory/integrations/calendar/
  hubspot:              Fredis/Memory/integrations/hubspot/
  g-drive:              Fredis/Memory/integrations/drive/
  g-sheets:             Fredis/Memory/integrations/sheets/
  g-docs:               Fredis/Memory/integrations/docs/
  github:               Fredis/Memory/integrations/github/

# Channel-ID → folder map. Wins over `channels:` when a match exists —
# survives channel renames without config edits. Populated from
# `query.py slack channels` on 2026-04-22.
by_id:
  # Topic lanes
  C0AUE2B6BL6: Fredis/Memory/ideation/             # #ideation
  C0AUKMRJDD2: Fredis/Memory/research/markets/     # #market-research
  C0AUG4DR6SE: Fredis/Memory/marketing/            # #marketing
  C0AUG4FUED8: Fredis/Memory/product/              # #product
  C0AUCMRCRRB: Fredis/Memory/legal/                # #legal
  C0AVACFKG0Y: Fredis/Memory/finance/              # #finances

  # Research
  C0AUV1ME2QH: Fredis/Memory/research/ai/          # #research-ai
  C0AU9NUEXPD: Fredis/Memory/research/agriculture/ # #research-agriculture
  C0AUE2W4BB8: Fredis/Memory/research/robotics/    # #research-robotics
  C0AUV1S3Q3T: Fredis/Memory/research/policy/      # #research-policy
  C0AUKN2R58C: Fredis/Memory/research/materials/   # #research-materials

  # Product builds
  C0AVACS6CSC: Fredis/Memory/builds/email-hub/     # #email-hub
  C0AUG4UD57C: Fredis/Memory/builds/vtv/           # #vtv
  C0AU0LYGGET: Fredis/Memory/builds/cab-app/       # #cab-app

  # People / orgs
  C0AUKNB6T6G: Fredis/Memory/retainers/            # #clients
  C0AVACWUDPA: Fredis/Memory/competitors/          # #competition
  C0AUKNCT3K6: Fredis/Memory/partners/             # #partners

  # Integrations
  C0AU9PHDPEX: Fredis/Memory/integrations/gmail/    # #gmail
  C0AUKNQ983W: Fredis/Memory/integrations/calendar/ # #calendar
  C0AUNFDEHUJ: Fredis/Memory/integrations/hubspot/  # #hubspot (renamed from #hub-spot on 2026-04-23)
  C0AUE43613Q: Fredis/Memory/daily/                 # #monday — retired channel; messages fall through to daily log
  C0AUG5Y8MT4: Fredis/Memory/integrations/drive/    # #g-drive
  C0AUKPCR3C4: Fredis/Memory/integrations/sheets/   # #g-sheets
  C0AUKPE7MT6: Fredis/Memory/integrations/docs/     # #g-docs
  C0AUKPEB0SY: Fredis/Memory/integrations/github/   # #github

# DMs and unmapped channels fall through to these defaults.
defaults:
  dm:       Fredis/Memory/daily/
  fallback: Fredis/Memory/daily/

# Model tier per channel. Opus for deep strategy + research; Haiku for quick
# transactional channels (integrations); Sonnet as the balanced default for
# everything else (including DMs and unmapped channels).
# Channel alias → concrete model ID is resolved in channel_router.MODEL_IDS.
models:
  opus:
    - product
    - vtv
    - email-hub
    - cab-app
    - ideation
    - market-research
    - research-ai
    - research-agriculture
    - research-robotics
    - research-policy
    - research-materials
    - clients
    # Promoted 2026-05-03 — high-stakes reasoning (IP/contracts; cross-border
    # tax, double-tax, PE rules) where a missed nuance is more expensive than
    # the model delta. Both channels are low-volume; cost impact is negligible.
    - legal
    - finances
  # All integration channels promoted to sonnet (default) on 2026-04-23
  # after #gmail showed Haiku ignored multi-rule prompts (draft routing,
  # search-before-asking). The same failure mode would bite on the other
  # write-capable integration channels (#hubspot mutates CRM state,
  # #g-sheets appends rows). Reliability
  # matters more than the ~$0.08/msg delta on a small-volume surface.
  # Re-add a channel name under `haiku` only if its cost becomes material
  # (thousands of turns/month).
  haiku: []
  default: sonnet

# Per-channel scoping (tools / MCP / skills). Set `false` to revert every
# channel to the legacy "everything everywhere" behaviour without a code revert.
# Reload requires a chat-engine restart; YAML is read once at startup.
scoping_enabled: true

# Per-channel built-in tool palette. Channel name → list of tools BEYOND the
# always-on base palette (Read, Write, Edit, Glob, Grep, Skill — every channel
# including DMs gets these). Missing channel → tools.defaults.fallback.
tools:
  by_channel:
    # Strategy / research / content channels: web research, no shell.
    ideation:             [WebSearch, WebFetch]
    product:              [WebSearch, WebFetch]
    market-research:      [WebSearch, WebFetch]
    research-ai:          [WebSearch, WebFetch]
    research-agriculture: [WebSearch, WebFetch]
    research-robotics:    [WebSearch, WebFetch]
    research-policy:      [WebSearch, WebFetch]
    research-materials:   [WebSearch, WebFetch]
    marketing:            [WebSearch, WebFetch]
    legal:                [WebSearch, WebFetch]
    finances:             [WebSearch, WebFetch]
    competition:          [WebSearch, WebFetch]
    clients:              [WebSearch, WebFetch]
    # Build channels: full palette — engineering work needs Bash + tests.
    email-hub:            [WebSearch, WebFetch, Bash, NotebookEdit]
    vtv:                  [WebSearch, WebFetch, Bash, NotebookEdit]
    cab-app:              [WebSearch, WebFetch, Bash, NotebookEdit]
    github:               [WebSearch, WebFetch, Bash]
    # Integration channels (gmail/calendar/hubspot/g-*) and partners get
    # base only — they hit the fallback list below.
  defaults:
    dm:        [WebSearch, WebFetch, Bash, NotebookEdit]   # universal surface
    fallback:  []                                          # base palette only

# Per-channel MCP server mounts. Server names match keys in the engine's
# server registry (see mcp_tools.py). Missing channel → mcp_servers.defaults.fallback.
mcp_servers:
  by_channel:
    # Today only the `fredis` server (Gmail) exists. Mount it where Gmail
    # tools are likely to be invoked.
    gmail:    [fredis]
    ideation: [fredis]   # ideation often produces "we should email X" moments
    # Future MCP servers (calendar, hubspot, drive, sheets, docs) get their
    # own lines when those servers ship — see fredis-ob1-integration.md.
  defaults:
    dm:       [fredis]   # universal surface — every MCP server lives here
    fallback: []

# Per-channel skill availability (prompt-allowlist enforcement).
#   - `always`: skills loaded for every channel including DMs.
#   - `by_channel`: extra skills loaded for the named channel.
#   - `defaults.dm`: ALL sentinel = no allowlist clause; full skill discovery.
#   - Missing channel → defaults.fallback (= base "always" only).
# Note: skills auto-discover from .claude/skills/ regardless of this block —
# the SDK has no clean per-call skill-discovery filter. This config drives a
# system-prompt rule telling the model which skills it may invoke; it is
# soft enforcement, not a hard filter. See per-channel-tool-mcp-skill-scoping.md.
skills:
  always:
    - obsidian-vault-structure
    - integrations
    - skill-creator
    # phase1-ready dropped from always (2026-05-03): one-time onboarding
    # bootstrap, BOOTSTRAP.md already deleted, has a re-run guard. Skill
    # file remains in .claude/skills/ — discoverable via DMs (ALL sentinel)
    # if a re-onboarding ever fires.
  by_channel:
    # ALL sentinel: ideation is cross-domain. Same universal-surface
    # semantics as DMs — every skill is invocable, no scope rule emitted.
    ideation: ALL
    product:
      - ip-overhang-guard
      - executive-leadership
      - technical-leadership
      - org-design
      - product-management
      - content-artifacts
      - idea-validation
      - product-shape
      - launch-governance
    market-research:
      - business-cycle-analyst
      - data-and-experimentation
      - product-management
      - idea-validation
      - product-shape
    research-ai:
      - data-and-experimentation
      - security-engineering
      - business-cycle-analyst
    research-agriculture:
      - business-cycle-analyst
      - data-and-experimentation
    research-robotics:
      - robotics-engineer
      - data-and-experimentation
    research-policy:
      - business-cycle-analyst
      - data-and-experimentation
    research-materials:
      - business-cycle-analyst
      - data-and-experimentation
    marketing:
      - content-social
      - content-artifacts
    legal:
      - ip-overhang-guard
      - ciso-advisor
      - uk-latvia-context
    finances:
      - business-cycle-analyst
      - uk-latvia-context
    competition:
      - business-cycle-analyst
      - idea-validation
    partners:
      - executive-leadership
    clients:
      - executive-leadership
      - org-design
      - content-artifacts
      - client-log
    email-hub:
      - ip-overhang-guard
      - ciso-advisor
      - technical-leadership
      - security-engineering
      - engineering
      - data-and-experimentation
      - product-management
      - product-shape
      - launch-governance
    vtv:
      - ip-overhang-guard
      - ciso-advisor
      - technical-leadership
      - security-engineering
      - engineering
      - data-and-experimentation
      - product-management
      - product-shape
      - launch-governance
    cab-app:
      - ip-overhang-guard
      - ciso-advisor
      - technical-leadership
      - security-engineering
      - engineering
      - data-and-experimentation
      - product-management
      - product-shape
